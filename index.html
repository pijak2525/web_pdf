<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แปลงเอกสาร Word เป็น PDF | PB.Com</title>
    <meta name="description" content="แปลงไฟล์ .docx เป็น .pdf ได้ง่ายๆ ด้วยระบบของ PB.Com ใช้งานฟรี คุณภาพสูง รองรับภาษาไทย 100%">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 400px; text-align: center; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        
        .upload-area { border: 2px dashed #dee2e6; padding: 40px; border-radius: 15px; cursor: pointer; margin-bottom: 25px; transition: 0.3s; color: #888; }
        .upload-area:hover { border-color: #6c5ce7; color: #6c5ce7; }
        
        .btn-convert { background: #6c5ce7; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-convert:hover { background: #5a4ad1; }
        
        .counter { margin-top: 25px; font-size: 12px; color: #adb5bd; }
    </style>
</head>
<body>

    <div class="card">
        <h1>แปลงเอกสาร Word เป็น PDF</h1>
        <p>ใช้งานได้ ฟรีๆๆ ครับ</p>
        
        <div class="upload-area" onclick="document.getElementById('upload').click()">
            <input type="file" id="upload" accept=".docx" style="display:none">
            <span id="file-name">คลิกเพื่อเลือกไฟล์ Word</span>
        </div>
        
        <button class="btn-convert" onclick="processAndPrint()">เริ่มการแปลงเอกสาร</button>
        
        <div class="counter">
            จำนวนผู้เข้าชมทั้งหมด: <span id="total-hits">...</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script>
        // ระบบนับยอด
        fetch('https://api.counterapi.dev/v1/pb-converter/page-hits/up')
            .then(res => res.json())
            .then(data => document.getElementById('total-hits').innerText = data.count);

        // เปลี่ยนชื่อไฟล์ใน UI
        document.getElementById('upload').addEventListener('change', function() {
            if(this.files.length > 0) document.getElementById('file-name').innerText = this.files[0].name;
        });

        // ระบบแปลง
        async function processAndPrint() {
            const input = document.getElementById('upload');
            if (!input.files[0]) return alert("กรุณาเลือกไฟล์ Word ก่อนครับ");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await mammoth.convertToHtml({arrayBuffer: e.target.result});
                const printWindow = window.open('', '_blank', 'width=800,height=600');
                printWindow.document.write(`<html><head><style>body{font-family:Prompt,sans-serif;padding:30px;}</style></head><body>${result.value}</body></html>`);
                printWindow.document.close();
                setTimeout(() => { printWindow.print(); }, 500);
            };
            reader.readAsArrayBuffer(input.files[0]);
        }
    </script>
</body>
</html>
